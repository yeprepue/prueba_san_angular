<div class="min-h-screen bg-gray-100 p-6">
  <div class="max-w-7xl mx-auto">
    <h1 class="text-3xl font-bold text-gray-800 mb-6">Gestión de Clientes</h1>

    <div class="bg-white rounded-lg shadow-md p-6 mb-6">
      <div class="flex flex-col md:flex-row md:items-center md:justify-between gap-4 mb-6">
        <label for="filtro" class="sr-only">Buscar clientes</label>
        <input
          id="filtro"
          type="text"
          [value]="filtro"
          (input)="filtro = $any($event.target).value; filtrarClientes()"
          placeholder="Buscar por nombre, email o categoría..."
          class="flex-1 border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500"
        />
        <button
          (click)="abrirFormularioCrear()"
          class="bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2 px-6 rounded-lg transition duration-200"
        >
          Nuevo Cliente
        </button>
      </div>

      <div *ngIf="cargando" class="text-center py-8 text-gray-500">
        Cargando clientes...
      </div>

      <div class="overflow-x-auto" *ngIf="!cargando">
        <table class="w-full text-left border-collapse">
          <thead>
            <tr class="bg-gray-50 border-b border-gray-200">
              <th class="py-3 px-4 text-gray-600 font-semibold">ID</th>
              <th class="py-3 px-4 text-gray-600 font-semibold">Nombre</th>
              <th class="py-3 px-4 text-gray-600 font-semibold">Email</th>
              <th class="py-3 px-4 text-gray-600 font-semibold">Categoría</th>
              <th class="py-3 px-4 text-gray-600 font-semibold">Estado</th>
              <th class="py-3 px-4 text-gray-600 font-semibold text-center">Acciones</th>
            </tr>
          </thead>
          <tbody>
            <tr *ngFor="let cliente of clientesFiltrados" class="border-b border-gray-100 hover:bg-gray-50">
              <td class="py-3 px-4 text-gray-700">{{ cliente.id }}</td>
              <td class="py-3 px-4 text-gray-700">{{ cliente.nombre }}</td>
              <td class="py-3 px-4 text-gray-700">{{ cliente.email }}</td>
              <td class="py-3 px-4 text-gray-700">{{ cliente.categoria }}</td>
              <td class="py-3 px-4 text-gray-700">
                <span [class]="cliente.estado === 1 ? 'text-green-600 font-semibold' : 'text-red-600 font-semibold'">
                  {{ cliente.estado === 1 ? 'Activo' : 'Inactivo' }}
                </span>
              </td>
              <td class="py-3 px-4 text-center">
                <button
                  (click)="abrirFormularioEditar(cliente)"
                  class="bg-yellow-500 hover:bg-yellow-600 text-white font-semibold py-1 px-3 rounded mr-2 transition duration-200"
                >
                  Editar
                </button>
                <button
                  (click)="eliminarCliente(cliente.id)"
                  class="bg-red-500 hover:bg-red-600 text-white font-semibold py-1 px-3 rounded transition duration-200"
                >
                  Eliminar
                </button>
              </td>
            </tr>
            <tr *ngIf="!cargando && clientesFiltrados.length === 0">
              <td colspan="6" class="py-6 text-center text-gray-500">
                No se encontraron clientes.
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>

    <div *ngIf="editando || clienteForm.nombre" class="bg-white rounded-lg shadow-md p-6">
      <h2 class="text-2xl font-bold text-gray-800 mb-4">
        {{ editando ? 'Editar Cliente' : 'Nuevo Cliente' }}
      </h2>
      <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <div>
          <label class="block text-gray-700 font-medium mb-1" for="cliente-nombre">Nombre</label>
          <input
            id="cliente-nombre"
            type="text"
            [value]="clienteForm.nombre"
            (input)="clienteForm.nombre = $any($event.target).value"
            class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500"
          />
        </div>
        <div>
          <label class="block text-gray-700 font-medium mb-1" for="cliente-email">Email</label>
          <input
            id="cliente-email"
            type="email"
            [value]="clienteForm.email"
            (input)="clienteForm.email = $any($event.target).value"
            class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500"
          />
        </div>
        <div>
          <label class="block text-gray-700 font-medium mb-1" for="cliente-categoria">Categoría</label>
          <select
            id="cliente-categoria"
            [value]="clienteForm.categoria"
            (change)="clienteForm.categoria = $any($event.target).value"
            class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500"
          >
            <option *ngFor="let cat of categorias" [value]="cat.valor">{{ cat.etiqueta }}</option>
          </select>
        </div>
        <div>
          <label class="block text-gray-700 font-medium mb-1" for="cliente-estado">Estado</label>
          <select
            id="cliente-estado"
            [value]="clienteForm.estado"
            (change)="clienteForm.estado = +$any($event.target).value"
            class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500"
          >
            <option [value]="1">Activo</option>
            <option [value]="0">Inactivo</option>
          </select>
        </div>
      </div>
      <div class="mt-6 flex gap-3">
        <button
          (click)="guardarCliente()"
          class="bg-green-600 hover:bg-green-700 text-white font-semibold py-2 px-6 rounded-lg transition duration-200"
        >
          Guardar
        </button>
        <button
          (click)="cancelar()"
          class="bg-gray-500 hover:bg-gray-600 text-white font-semibold py-2 px-6 rounded-lg transition duration-200"
        >
          Cancelar
        </button>
      </div>
    </div>
  </div>
</div>
